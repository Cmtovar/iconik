<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iconik</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: monospace;
    background: #1a1a1f;
    color: #eee;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ===== Unified Player Bar (top) ===== */
  #audio-player {
    background: #16213e;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #0f3460;
    position: relative;
    flex-shrink: 0;
    z-index: 20;
  }


  #play-btn {
    background: none;
    border: 2px solid #e94560;
    color: #e94560;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
    line-height: 1;
    padding: 0;
  }
  #play-btn:hover { background: rgba(233, 69, 96, 0.15); }
  #play-btn:disabled { opacity: 0.35; cursor: default; }

  #filename {
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    max-width: 140px;
    flex-shrink: 1;
    color: #aaa;
  }

  #scrub-wrap {
    flex: 1;
    min-width: 0;
    height: 6px;
    background: #0f3460;
    border-radius: 3px;
    cursor: pointer;
    position: relative;
  }
  #scrub-fill {
    height: 100%;
    width: 0%;
    background: #e94560;
    border-radius: 3px;
    pointer-events: none;
  }

  #time-display {
    font-size: 12px;
    white-space: nowrap;
    flex-shrink: 0;
    color: #ccc;
  }

  /* ===== Main area: sidebar + grid ===== */
  #main-area {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  #sidebar {
    width: 260px;
    background: #16213e;
    padding: 12px;
    overflow-y: auto;
    border-right: 2px solid #0f3460;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
  }
  #sidebar h2 {
    font-size: 13px;
    color: #e94560;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #sidebar button {
    background: #0f3460;
    color: #eee;
    border: 1px solid #e94560;
    padding: 7px 10px;
    cursor: pointer;
    font-family: monospace;
    font-size: 12px;
    border-radius: 4px;
  }
  #sidebar button:hover { background: #e94560; }
  #sidebar button:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  #sidebar button:disabled:hover { background: #0f3460; }

  .dot-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 1px 4px;
    background: #0f3460;
    border-radius: 3px;
    font-size: 11px;
  }
  .dot-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1.5px solid #fff;
    flex-shrink: 0;
  }
  .dot-name-btn {
    background: none; border: 1px solid #333; color: #999; padding: 2px 6px;
    font-family: monospace; font-size: 11px; border-radius: 3px; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .dot-name-btn:hover { border-color: #e94560; color: #eee; }
  .dot-name-btn.active { border-color: #e94560; color: #eee; background: #e94560; }

  #dots-list { display: flex; flex-direction: column; gap: 1px; }

  .snapshot {
    background: #0f3460;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 6px 8px;
    cursor: pointer;
    font-size: 12px;
    position: relative;
  }
  .snapshot:hover { border-color: #e94560; }
  .snapshot .snap-title { font-weight: bold; margin-bottom: 2px; }
  .snapshot .snap-info { color: #999; font-size: 11px; }
  .snapshot .snap-delete {
    position: absolute;
    top: 3px;
    right: 5px;
    color: #e94560;
    cursor: pointer;
    font-size: 14px;
    background: none;
    border: none;
    padding: 2px 4px;
  }

  #snapshots-list { display: flex; flex-direction: column; gap: 6px; flex: 1; overflow-y: auto; }

  #storage-btns { display: flex; gap: 6px; }
  #storage-btns button { font-size: 11px; padding: 5px 8px; }

  /* ===== Grid canvas ===== */
  #grid-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: default;
  }
  #grid-container canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ===== Formation timeline bar (bottom) ===== */
  #timeline-section {
    position: fixed;
    bottom: 12px;
    left: 12px;
    right: 12px;
    height: 160px;
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 6px;
    overflow: hidden;
    user-select: none;
    display: flex;
    flex-direction: column;
    z-index: 20;
  }
  #timeline-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 12px;
    font-size: 12px;
    border-bottom: 1px solid #0f3460;
  }
  #timeline-controls button {
    background: #0f3460;
    border: 1px solid #e94560;
    color: #eee;
    font-family: monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
  }
  #timeline-controls button:hover { background: #e94560; }
  .tl-time-display {
    color: #e94560;
    font-size: 13px;
    font-weight: bold;
    min-width: 50px;
    text-align: center;
  }
  #formation-info {
    color: #888;
    font-size: 11px;
    margin-left: auto;
  }
  #timelineCanvas {
    width: 100%;
    height: 130px;
    display: block;
  }

  /* Horizontal scrollbar below timeline */
  .timeline-scrollbar {
    width: 100%;
    height: 18px;
    background: #16213e;
    border-top: 1px solid #0f3460;
    display: flex;
    align-items: center;
    padding: 0 4px;
  }

  .timeline-scrollbar input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 8px;
    background: #0f3460;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }

  .timeline-scrollbar input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 24px;
    height: 12px;
    background: #e94560;
    border-radius: 3px;
    cursor: pointer;
  }

  .timeline-scrollbar input[type="range"]::-moz-range-thumb {
    width: 24px;
    height: 12px;
    background: #e94560;
    border: none;
    border-radius: 3px;
    cursor: pointer;
  }

  .timeline-scrollbar input[type="range"]::-moz-range-track {
    background: #0f3460;
    height: 8px;
    border-radius: 4px;
  }

</style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script>
// ========================================================================
//  IconikStorage (inlined from storage.js)
// ========================================================================
const IconikStorage = {
  save(key, data) {
    try { localStorage.setItem('iconik_' + key, JSON.stringify(data)); }
    catch (e) { console.warn('localStorage save failed:', e); }
  },
  load(key) {
    try {
      const raw = localStorage.getItem('iconik_' + key);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { console.warn('localStorage load failed:', e); return null; }
  },
  exportJSON(key, data, filename) {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'iconik_' + key + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  },
  importJSON() {
    return new Promise((resolve, reject) => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.addEventListener('change', () => {
        const file = input.files[0];
        if (!file) return reject(new Error('No file selected'));
        const reader = new FileReader();
        reader.onload = () => {
          try { resolve(JSON.parse(reader.result)); }
          catch (e) { reject(new Error('Invalid JSON file')); }
        };
        reader.onerror = () => reject(new Error('Failed to read file'));
        reader.readAsText(file);
      });
      input.click();
    });
  }
};

// ========================================================================
//  Shared State
// ========================================================================
const DOT_RADIUS = 10;
const COLORS = [
  '#e94560','#3498db','#2ecc71','#f39c12','#9b59b6',
  '#1abc9c','#e67e22','#e74c3c','#00bcd4'
];

const MEMBERS = [
  { idol: 'HANBIN',   member: 'Jordan' },
  { idol: 'JIWOONG',  member: 'Caroline' },
  { idol: 'MATTHEW',  member: 'Bela' },
  { idol: 'TAERAE',   member: 'Gauri' },
  { idol: 'GUNWOOK',  member: 'Dani' },
  { idol: 'ZHANGHAO', member: 'Natalie' },
  { idol: 'RICKY',    member: 'Imene' },
  { idol: 'GYUVIN',   member: 'Cristian' },
  { idol: 'YUJIN',    member: 'Lauren' },
];

const VISIBLE_WINDOW = 15; // +/- 15 seconds from center = 30 seconds total visible

let dots = [];          // { id, gx, gy, color, name, idol, member }
let snapshots = [];     // { name, timestamp, dots: [...] }
let markers = [];       // sorted array of seconds (formation boundaries)
let markerHistory = []; // undo stack for markers
const MARKER_HISTORY_LIMIT = 50;
function pushMarkerHistory() {
  markerHistory.push(markers.slice());
  if (markerHistory.length > MARKER_HISTORY_LIMIT) markerHistory.shift();
  const btn = document.getElementById('undoMarkerBtn');
  if (btn) { btn.style.opacity = '1'; btn.style.cursor = 'pointer'; }
}
function undoMarkers() {
  if (markerHistory.length === 0) return;
  markers = markerHistory.pop();
  renderSnapshots();
  autoSave();
  const btn = document.getElementById('undoMarkerBtn');
  if (btn && markerHistory.length === 0) { btn.style.opacity = '0.4'; btn.style.cursor = 'default'; }
}
let formationCounter = 0;
let flaggedFormations = new Set(); // indices of flagged formations

let currentTime = 0;    // shared timeline time in seconds
let playing = false;
let lastFrameTime = null;
let videoMode = 'zb1';

const VIDEO_SYNC = {
  'reference-av.mp4': { offset: 0 },
  'dkdc-av.mp4': { offset: 0 }
};

// ========================================================================
//  Helpers
// ========================================================================
function fmt(sec) {
  if (!isFinite(sec)) sec = 0;
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function parseTime(str) {
  str = str.trim();
  const m = str.match(/^(\d{1,3}):(\d{2})$/);
  if (!m) return null;
  const mins = parseInt(m[1], 10);
  const secs = parseInt(m[2], 10);
  if (secs >= 60) return null;
  return mins * 60 + secs;
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

// ========================================================================
//  Persistence
// ========================================================================
const firebaseConfig = {
  apiKey: 'AIzaSyAZCog1B2inZSq-bWBhiixq4yQrLA19hOY',
  authDomain: 'iconik-app.firebaseapp.com',
  databaseURL: 'https://iconik-app-default-rtdb.firebaseio.com',
  projectId: 'iconik-app',
  storageBucket: 'iconik-app.firebasestorage.app',
  messagingSenderId: '320703532118',
  appId: '1:320703532118:web:2877c7b51b11ed7b6f3ff7'
};

let cloudRef = null;
let cloudSaveTimer = null;

function setCloudStatus(text, isError) {
  const el = document.getElementById('cloud-status');
  if (!el) return;
  el.textContent = 'Cloud: ' + text;
  el.style.color = isError ? '#e94560' : '#999';
}


function memberForDot(id) {
  return MEMBERS[(id || 1) - 1] || MEMBERS[0];
}

function normalizeDotPosition(d) {
  let gx = d && Number.isFinite(d.gx) ? d.gx : 0;
  let gy = d && Number.isFinite(d.gy) ? d.gy : 0;

  // Migrate older top-left grid coordinates into the current center-origin grid.
  if (gx > 9 || gx < -9 || gy > 5 || gy < -5) {
    gx = (gx - 15) / 1.5;
    gy = (9.5 - gy) / 1.5;
  }

  return {
    gx: Math.max(-9, Math.min(9, gx)),
    gy: Math.max(-5, Math.min(5, gy))
  };
}

function normalizeDot(d, index) {
  const id = d && d.id ? d.id : index + 1;
  const member = memberForDot(id);
  const name = d && d.name ? d.name : member.idol;
  const pos = normalizeDotPosition(d);
  return {
    id,
    gx: pos.gx,
    gy: pos.gy,
    color: (d && d.color) || COLORS[(id - 1) % COLORS.length],
    name,
    idol: (d && d.idol) || member.idol,
    member: (d && d.member) || member.member
  };
}

function normalizeDots(source) {
  return (source || []).map(normalizeDot);
}

function getAppState() {
  return {
    dots: dots.map((d, i) => normalizeDot(d, i)),
    snapshots: snapshots.map(snap => ({
      ...snap,
      dots: normalizeDots(snap.dots)
    })),
    markers: markers.slice().sort((a, b) => a - b),
    formationCounter,
    flaggedFormations: [...flaggedFormations]
  };
}

function applyAppState(data) {
  if (!data) return;
  if (data.dots && data.dots.length === 9) dots = normalizeDots(data.dots);
  if (data.snapshots) {
    snapshots = data.snapshots.map(snap => ({
      ...snap,
      dots: normalizeDots(snap.dots)
    }));
  }
  if (data.markers) {
    markers = data.markers.slice().sort((a, b) => a - b);
  }
  if (Number.isFinite(data.formationCounter)) formationCounter = data.formationCounter;
  if (Array.isArray(data.flaggedFormations)) flaggedFormations = new Set(data.flaggedFormations);
}

function hasMeaningfulState(state) {
  return !!state && (
    (state.markers && state.markers.length > 0) ||
    (state.snapshots && state.snapshots.length > 0) ||
    state.formationCounter > 0
  );
}

function stateScore(state) {
  if (!state) return 0;
  return ((state.snapshots && state.snapshots.length) || 0) * 1000 +
    ((state.markers && state.markers.length) || 0) * 10 +
    (state.formationCounter || 0) +
    ((state.dots && state.dots.length) || 0);
}

function autoSave() {
  const state = getAppState();
  IconikStorage.save('app', state);
  queueCloudSave(state);
}

function autoRestore() {
  const data = IconikStorage.load('app');
  if (data) applyAppState(data);
}

function queueCloudSave(state) {
  if (!cloudRef) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(() => saveToCloud(state), 500);
}

async function saveToCloud(state) {
  if (!cloudRef) return;
  try {
    setCloudStatus('saving...');
    await cloudRef.set({
      data: state || getAppState(),
      updatedAt: Date.now()
    });
    setCloudStatus('saved ' + new Date().toLocaleTimeString());
  } catch (e) {
    console.warn('Cloud save failed:', e);
    setCloudStatus('save failed', true);
  }
}

function applyRestoredState(state, statusText) {
  applyAppState(state);
  IconikStorage.save('app', getAppState());
  drawGrid();
  renderDotsList();
  renderSnapshots();
  if (typeof window._timelineDraw === 'function') window._timelineDraw();
  if (statusText) setCloudStatus(statusText);
}

async function startCloudSync() {
  if (!window.firebase || !firebase.apps) {
    setCloudStatus('offline', true);
    return;
  }

  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    cloudRef = firebase.database().ref('backups/default');
    setCloudStatus('connected');

    const localState = getAppState();
    const snap = await cloudRef.get();
    const cloudPayload = snap.val();
    const cloudState = cloudPayload && cloudPayload.data;
    if (hasMeaningfulState(cloudState)) {
      if (!hasMeaningfulState(localState) || stateScore(cloudState) >= stateScore(localState)) {
        applyRestoredState(cloudState, 'restored cloud backup');
      } else {
        // Local has more data — push it to cloud
        queueCloudSave(localState);
        setCloudStatus('local data saved to cloud');
      }
    } else if (hasMeaningfulState(localState)) {
      // No cloud backup yet — push local data up
      queueCloudSave(localState);
      setCloudStatus('saved local data to cloud');
    } else if (snap.exists()) {
      setCloudStatus('backup is empty');
    } else {
      setCloudStatus('ready');
    }
  } catch (e) {
    console.warn('Cloud sync unavailable:', e);
    setCloudStatus('unavailable', true);
  }
}

// ========================================================================
//  Dot Grid
// ========================================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let hoveredDot = null;
let draggingDot = null;
let dragPixelX = 0;
let dragPixelY = 0;

function initTriangle() {
  // Center-origin coords: gx=0,gy=0 is center, +X right, +Y up
  const positions = [
    { gx: 0, gy: 3 },       // top of triangle
    { gx: -2, gy: 1 },
    { gx: 2, gy: 1 },
    { gx: -4, gy: -1 },
    { gx: 0, gy: -1 },
    { gx: 4, gy: -1 },
    { gx: -4, gy: -3 },
    { gx: 0, gy: -3 },
    { gx: 4, gy: -3 },
  ];
  dots = positions.map((pos, i) => ({
    id: i + 1,
    gx: pos.gx,
    gy: pos.gy,
    color: COLORS[i],
    name: MEMBERS[i].idol,
    idol: MEMBERS[i].idol,
    member: MEMBERS[i].member,
  }));
}

// Grid layout: 18 columns (16 + 2 extra) x 10 rows, center-origin
// gx=0,gy=0 is center. +X right, +Y up.
// Pixel position: px = cx + gx * unit, py = cy - gy * unit
let _gridUnit = 1;   // cached unit size
let _gridCx = 0;     // cached pixel center X
let _gridCy = 0;     // cached pixel center Y

function gridToPixel(gx, gy) {
  return { px: _gridCx + gx * _gridUnit, py: _gridCy - gy * _gridUnit };
}

function pixelToGrid(px, py) {
  return { gx: (px - _gridCx) / _gridUnit, gy: -((py - _gridCy) / _gridUnit) };
}

function resizeGrid() {
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = canvas.parentElement.clientHeight;
  drawGrid();
}

function drawGrid() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#1a1a1f';
  ctx.fillRect(0, 0, W, H);

  // Stage dimensions — fit inside canvas with margins and avoid fixed overlays.
  const marginX = Math.max(40, W * 0.08);
  const marginY = Math.max(20, H * 0.04);
  const stageW = W - marginX * 2;
  const gridRect = canvas.parentElement.getBoundingClientRect();
  const videoEl = document.getElementById('video-placeholder');
  const timelineEl = document.getElementById('timeline-section');
  const labelReserve = 44;

  let topReserve = marginY;
  if (videoEl) {
    const videoRect = videoEl.getBoundingClientRect();
    topReserve = Math.max(topReserve, videoRect.bottom - gridRect.top + 18);
  }

  let bottomLimit = H - marginY;
  if (timelineEl) {
    const timelineRect = timelineEl.getBoundingClientRect();
    const timelineTop = timelineRect.top - gridRect.top;
    if (timelineTop > topReserve) bottomLimit = Math.min(bottomLimit, timelineTop - 16);
  }

  const stageH = Math.max(120, bottomLimit - topReserve - labelReserve);

  // 16 wide x 10 tall, square cells
  const maxUnitW = stageW / 16;
  const maxUnitH = stageH / 10;
  const unit = Math.min(maxUnitW, maxUnitH);
  const sw = unit * 16;
  const sh = unit * 10;

  const left = (W - sw) / 2;
  const top = topReserve;
  const cx = left + sw / 2;
  const cy = top + sh / 2;

  // Cache for coordinate conversions
  _gridUnit = unit;
  _gridCx = cx;
  _gridCy = cy;

  // Rounded clip path for stage fill
  const r = 14;
  const bLeft = left - unit, bTop = top, bW = sw + unit * 2, bH = sh;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(bLeft + r, bTop);
  ctx.lineTo(bLeft + bW - r, bTop);
  ctx.quadraticCurveTo(bLeft + bW, bTop, bLeft + bW, bTop + r);
  ctx.lineTo(bLeft + bW, bTop + bH - r);
  ctx.quadraticCurveTo(bLeft + bW, bTop + bH, bLeft + bW - r, bTop + bH);
  ctx.lineTo(bLeft + r, bTop + bH);
  ctx.quadraticCurveTo(bLeft, bTop + bH, bLeft, bTop + bH - r);
  ctx.lineTo(bLeft, bTop + r);
  ctx.quadraticCurveTo(bLeft, bTop, bLeft + r, bTop);
  ctx.closePath();
  ctx.clip();

  // Dark fill
  ctx.fillStyle = '#2d2d44';
  ctx.fillRect(bLeft, bTop, bW, bH);

  // Outer columns (2 on each side) slightly lighter
  ctx.fillStyle = '#3f3f55';
  ctx.fillRect(bLeft, bTop, unit * 2, bH);
  ctx.fillRect(left + sw - unit, bTop, unit * 2, bH);

  // Grid lines (neutral gray)
  ctx.strokeStyle = '#707078';
  ctx.lineWidth = 1;

  // Vertical grid lines
  for (let i = -9; i <= 9; i++) {
    const x = cx + i * unit;
    ctx.beginPath();
    ctx.moveTo(x, top);
    ctx.lineTo(x, top + sh);
    ctx.stroke();
  }

  // Horizontal grid lines
  for (let i = -5; i <= 5; i++) {
    const y = cy + i * unit;
    ctx.beginPath();
    ctx.moveTo(left - unit, y);
    ctx.lineTo(left + sw + unit, y);
    ctx.stroke();
  }

  ctx.restore(); // remove clip

  // Red cross at center point
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 1.5;
  const crossLen = 10;
  ctx.beginPath(); ctx.moveTo(cx - crossLen, cy); ctx.lineTo(cx + crossLen, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy - crossLen); ctx.lineTo(cx, cy + crossLen); ctx.stroke();

  // Red border (rounded)
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(bLeft + r, bTop);
  ctx.lineTo(bLeft + bW - r, bTop);
  ctx.quadraticCurveTo(bLeft + bW, bTop, bLeft + bW, bTop + r);
  ctx.lineTo(bLeft + bW, bTop + bH - r);
  ctx.quadraticCurveTo(bLeft + bW, bTop + bH, bLeft + bW - r, bTop + bH);
  ctx.lineTo(bLeft + r, bTop + bH);
  ctx.quadraticCurveTo(bLeft, bTop + bH, bLeft, bTop + bH - r);
  ctx.lineTo(bLeft, bTop + r);
  ctx.quadraticCurveTo(bLeft, bTop, bLeft + r, bTop);
  ctx.closePath();
  ctx.stroke();

  // Red dash marks at midpoint of each edge
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 2;
  const dashLen = 10;
  ctx.beginPath(); ctx.moveTo(cx, bTop - dashLen); ctx.lineTo(cx, bTop + dashLen); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, bTop + bH - dashLen); ctx.lineTo(cx, bTop + bH + dashLen); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bLeft - dashLen, cy); ctx.lineTo(bLeft + dashLen, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bLeft + bW - dashLen, cy); ctx.lineTo(bLeft + bW + dashLen, cy); ctx.stroke();

  // Axis labels at bottom
  ctx.fillStyle = '#777';
  ctx.font = '26px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const labelY = top + sh + 20;
  for (let i = -8; i <= 8; i++) {
    ctx.fillText(Math.abs(i).toString(), cx + i * unit, labelY);
  }

  // Dots (rendered on top of grid)
  for (const dot of dots) {
    let x, y;
    if (dot === draggingDot) {
      x = dragPixelX;
      y = dragPixelY;
    } else {
      const p = gridToPixel(dot.gx, dot.gy);
      x = p.px;
      y = p.py;
    }
    ctx.beginPath();
    ctx.arc(x, y, DOT_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = (dot === hoveredDot || dot === draggingDot) ? '#fff' : (dot.color || '#e94560');
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // id label
    ctx.fillStyle = (dot === hoveredDot || dot === draggingDot) ? '#333' : '#fff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(dot.id, x, y);

    // name label above
    if (dot.name) {
      ctx.fillStyle = '#eee';
      ctx.font = 'bold 11px monospace';
      ctx.fillText(dot.name, x, y - DOT_RADIUS - 6);
    }
  }

}

function snapToGrid(px, py) {
  const g = pixelToGrid(px, py);
  // Snap to nearest 0.5 for half-grid snap
  return { gx: Math.round(g.gx * 2) / 2, gy: Math.round(g.gy * 2) / 2 };
}

function findDotAt(gx, gy) {
  return dots.find(d => Math.abs(d.gx - gx) < 0.01 && Math.abs(d.gy - gy) < 0.01) || null;
}

function findDotNearPixel(px, py) {
  for (const dot of dots) {
    const p = gridToPixel(dot.gx, dot.gy);
    const dx = p.px - px;
    const dy = p.py - py;
    if (Math.sqrt(dx * dx + dy * dy) <= DOT_RADIUS + 4) return dot;
  }
  return null;
}

// Drag handling on grid
canvas.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  const rect = canvas.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;
  const dot = findDotNearPixel(px, py);
  if (dot) {
    draggingDot = dot;
    const p = gridToPixel(dot.gx, dot.gy);
    dragPixelX = p.px;
    dragPixelY = p.py;
    canvas.style.cursor = 'grabbing';
    drawGrid();
  }
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;
  if (draggingDot) {
    dragPixelX = px;
    dragPixelY = py;
    drawGrid();
  } else {
    const prev = hoveredDot;
    hoveredDot = findDotNearPixel(px, py);
    if (hoveredDot !== prev) {
      canvas.style.cursor = hoveredDot ? 'grab' : 'default';
      drawGrid();
    }
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (!draggingDot) return;
  const rect = canvas.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;
  const { gx, gy } = snapToGrid(px, py);
  const occupant = findDotAt(gx, gy);
  if (!occupant || occupant === draggingDot) {
    draggingDot.gx = gx;
    draggingDot.gy = gy;
    updateCurrentFormationSnapshotFromDots();
  }
  draggingDot = null;
  canvas.style.cursor = 'default';
  drawGrid();
  renderDotsList();
  autoSave();
});

canvas.addEventListener('mouseleave', () => {
  if (draggingDot) {
    draggingDot = null;
    canvas.style.cursor = 'default';
    drawGrid();
  }
  hoveredDot = null;
});

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

function renderDotsList() {
  const list = document.getElementById('dots-list');
  list.innerHTML = '';
  for (const dot of dots) {
    const el = document.createElement('div');
    el.className = 'dot-item';
    const swatch = document.createElement('div');
    swatch.className = 'dot-swatch';
    swatch.style.background = dot.color || '#e94560';

    const idolBtn = document.createElement('button');
    idolBtn.className = 'dot-name-btn' + (dot.name === dot.idol ? ' active' : '');
    idolBtn.textContent = dot.idol;
    idolBtn.addEventListener('click', () => {
      dot.name = dot.idol;
      drawGrid();
      renderDotsList();
      autoSave();
    });

    const memberBtn = document.createElement('button');
    memberBtn.className = 'dot-name-btn' + (dot.name === dot.member ? ' active' : '');
    memberBtn.textContent = dot.member;
    memberBtn.addEventListener('click', () => {
      dot.name = dot.member;
      drawGrid();
      renderDotsList();
      autoSave();
    });

    el.appendChild(swatch);
    el.appendChild(idolBtn);
    el.appendChild(memberBtn);
    list.appendChild(el);
  }
}

// Save current dot positions to the active in-place formation
document.getElementById('btn-save').addEventListener('click', () => {
  const formations = window._getFormations ? window._getFormations() : [];
  const cur = window._getCurrentFormation ? window._getCurrentFormation(formations, currentTime) : null;
  if (!cur || cur.type !== 'inplace') return;

  const idx = Math.floor(cur.number / 2); // Formation 1->0, 3->1, 5->2
  // Grow snapshots array if needed
  while (snapshots.length <= idx) {
    snapshots.push({ name: 'Formation ' + (snapshots.length + 1), dots: null });
  }
  snapshots[idx].dots = dots.map(d => ({ ...d }));
  snapshots[idx].timestamp = new Date().toLocaleString();
  renderSnapshots();
  autoSave();
});

function renderSnapshots() {
  const list = document.getElementById('snapshots-list');
  list.innerHTML = '';

  const formations = window._getFormations ? window._getFormations() : [];
  const inPlaceFormations = formations.filter(f => f.type === 'inplace');

  // Ensure snapshots array matches the number of in-place formations
  while (snapshots.length < inPlaceFormations.length) {
    snapshots.push({ name: 'Formation ' + (snapshots.length + 1), dots: null });
  }

  const curFormation = window._getCurrentFormation ? window._getCurrentFormation(formations, currentTime) : null;

  inPlaceFormations.forEach((f, i) => {
    const snap = snapshots[i];
    const isCurrent = curFormation && curFormation.number === f.number;
    const hasDots = snap && snap.dots && snap.dots.length > 0;

    const el = document.createElement('div');
    el.className = 'snapshot';
    if (isCurrent) el.style.borderColor = '#e94560';

    const titleRow = document.createElement('div');
    titleRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;';

    const title = document.createElement('div');
    title.className = 'snap-title';
    title.style.flex = '1';
    title.textContent = (snap && snap.name) || ('Formation ' + (i + 1));
    if (!hasDots) title.textContent += ' (empty)';
    title.title = 'Double-click to rename';

    const flagBtn = document.createElement('button');
    flagBtn.textContent = flaggedFormations.has(i) ? '\u2691' : '\u2690';
    flagBtn.title = 'Flag this formation';
    flagBtn.style.cssText = 'background:none;border:none;cursor:pointer;font-size:16px;padding:0 4px;color:' + (flaggedFormations.has(i) ? '#e94560' : '#666') + ';';
    flagBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (flaggedFormations.has(i)) flaggedFormations.delete(i);
      else flaggedFormations.add(i);
      renderSnapshots();
      autoSave();
    });
    title.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      const input = document.createElement('input');
      input.type = 'text';
      input.value = snap.name || ('Formation ' + (i + 1));
      input.style.cssText = 'width:100%;background:#16213e;border:1px solid #e94560;color:#eee;font-family:monospace;font-size:12px;padding:2px 4px;border-radius:3px;';
      const finish = () => {
        const val = input.value.trim();
        if (val) snap.name = val;
        renderSnapshots();
        autoSave();
      };
      input.addEventListener('blur', finish);
      input.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') input.blur(); });
      title.replaceWith(input);
      input.focus();
      input.select();
    });

    const info = document.createElement('div');
    info.className = 'snap-info';
    info.textContent = fmt(f.startTime) + (f.endTime !== null ? ' – ' + fmt(f.endTime) : '+');

    titleRow.appendChild(title);
    titleRow.appendChild(flagBtn);
    el.appendChild(titleRow);
    el.appendChild(info);

    // Click to seek to this formation and load its dots
    el.addEventListener('click', () => {
      seekTo(f.startTime + 0.1);
      if (hasDots) {
        dots = snap.dots.map(d => ({ ...d }));
      } else {
        initTriangle();
      }
      drawGrid();
      renderDotsList();
      renderSnapshots();
    });

    list.appendChild(el);
  });
}

// Lightweight: just update which formation is highlighted (called every frame)
function updateActiveFormation() {
  const list = document.getElementById('snapshots-list');
  if (!list) return;
  const formations = window._getFormations ? window._getFormations() : [];
  const cur = window._getCurrentFormation ? window._getCurrentFormation(formations, currentTime) : null;
  const inPlaceFormations = formations.filter(f => f.type === 'inplace');
  const items = list.children;
  for (let i = 0; i < items.length; i++) {
    const isCurrent = cur && inPlaceFormations[i] && cur.number === inPlaceFormations[i].number;
    items[i].style.borderColor = isCurrent ? '#e94560' : '';
  }
}

(function() {
  const playBtn   = document.getElementById('play-btn');
  const scrubWrap = document.getElementById('scrub-wrap');
  const scrubFill = document.getElementById('scrub-fill');
  const timeDisp  = document.getElementById('time-display');

  let scrubDragging = false;
  let scrubResumeAfterSeek = false;

  function updateTopBar() {
    const dur = getPlaybackDuration();
    scrubFill.style.width = (dur ? (currentTime / dur) * 100 : 0) + '%';
    timeDisp.textContent = fmt(currentTime) + ' / ' + fmt(dur);
  }

  playBtn.addEventListener('click', () => setPlaying(!playing));

  function scrubTime(e) {
    const rect = scrubWrap.getBoundingClientRect();
    return Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)) * getPlaybackDuration();
  }

  scrubWrap.addEventListener('mousedown', (e) => {
    scrubDragging = true;
    scrubResumeAfterSeek = playing;
    if (playing) setPlaying(false);
    seekUI(scrubTime(e));
  });
  document.addEventListener('mousemove', (e) => { if (scrubDragging) seekUI(scrubTime(e)); });
  document.addEventListener('mouseup', () => {
    if (!scrubDragging) return;
    scrubDragging = false;
    seekTo(currentTime);
    if (scrubResumeAfterSeek) setPlaying(true);
    scrubResumeAfterSeek = false;
  });

  window._audioUpdateUI = updateTopBar;
})();

// ========================================================================
//  Playback System
//  - Primary video is the ONLY media element (audio muxed in)
//  - Secondary video (overlay/dkdc) is muted, follows primary
//  - One element = zero sync issues
// ========================================================================

function getAllVideos() {
  return Array.from(document.querySelectorAll('.compare-video'));
}

function getActiveVideos() {
  const zb1 = document.getElementById('ref-video');
  const dkdc = document.getElementById('dkdc-video');
  if (videoMode === 'overlay') return [zb1, dkdc].filter(Boolean);
  if (videoMode === 'dkdc') return dkdc ? [dkdc] : [];
  return zb1 ? [zb1] : [];
}

function getPrimaryVideo() {
  return getActiveVideos()[0] || null;
}

function getVideoSourceName(vid) {
  const source = vid && vid.querySelector('source');
  if (!source) return '';
  return (source.getAttribute('src') || '').split('/').pop();
}

function getVideoOffset(vid) {
  const meta = VIDEO_SYNC[getVideoSourceName(vid)];
  return meta ? meta.offset : 0;
}

function getVideoTargetTime(vid) {
  if (!vid || !isFinite(vid.duration)) return currentTime;
  return Math.max(0, Math.min(currentTime + getVideoOffset(vid), vid.duration));
}

function getPlaybackDuration() {
  const vid = getPrimaryVideo();
  if (vid && isFinite(vid.duration)) return vid.duration;
  return Math.max(60, currentTime);
}

function clampPlaybackTime(t) {
  const dur = getPlaybackDuration();
  return Math.max(0, Math.min(t, isFinite(dur) ? dur : Math.max(60, t)));
}

function updatePlaybackButtons() {
  const playBtn = document.getElementById('play-btn');
  const tlPlayBtn = document.getElementById('tl-play-btn');
  if (playBtn) playBtn.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
  if (tlPlayBtn) tlPlayBtn.innerHTML = playing ? '&#9646;&#9646; Pause' : '&#9654; Play';
}

// Seek the video to time t.
function seekTo(t) {
  currentTime = clampPlaybackTime(t);
  getAllVideos().forEach(vid => {
    if (isFinite(vid.duration)) vid.currentTime = getVideoTargetTime(vid);
  });
}

// UI-only seek: update currentTime for bars/dots, don't touch video.
function seekUI(t) {
  currentTime = clampPlaybackTime(t);
}

function setPlaying(state) {
  if (playing === state) return;
  playing = state;
  updatePlaybackButtons();

  if (playing) {
    seekTo(currentTime);
    getActiveVideos().forEach(vid => {
      if (isFinite(vid.duration)) vid.play().catch(() => {});
    });
  } else {
    getAllVideos().forEach(vid => { if (!vid.paused) vid.pause(); });
  }
}

// Called every frame: read time from primary video
function syncMedia() {
  if (playing) {
    const vid = getPrimaryVideo();
    if (vid && isFinite(vid.duration)) {
      currentTime = Math.max(0, vid.currentTime - getVideoOffset(vid));
    } else {
      const now = performance.now();
      if (lastFrameTime !== null) currentTime += (now - lastFrameTime) / 1000;
      lastFrameTime = now;
    }

    // Keep secondary video loosely synced (overlay mode)
    // Wide tolerance (2s) so it plays smoothly instead of constantly re-seeking
    const active = getActiveVideos();
    if (active.length > 1) {
      for (let i = 1; i < active.length; i++) {
        const sec = active[i];
        if (!isFinite(sec.duration)) continue;
        const target = getVideoTargetTime(sec);
        if (Math.abs(sec.currentTime - target) > 2) sec.currentTime = target;
        if (sec.paused && sec.currentTime < sec.duration) sec.play().catch(() => {});
      }
    }

    // If primary video ended, stop
    if (vid && vid.ended) setPlaying(false);
  }
}

function syncVideoToClock(force, vid) {
  if (!vid || !isFinite(vid.duration)) return;
  const target = getVideoTargetTime(vid);
  if (force || Math.abs(target - vid.currentTime) > 0.3) {
    vid.currentTime = target;
  }
}

function updateOffsetDisplay() {
  const vid = getPrimaryVideo();
  const offset = vid ? getVideoOffset(vid) : 0;
  const el = document.getElementById('offset-display');
  if (el) el.textContent = (offset >= 0 ? '+' : '') + offset.toFixed(2) + 's';
}

// ========================================================================
//  Formation Timeline Bar
// ========================================================================
(function() {
  const tlCanvas = document.getElementById('timelineCanvas');
  const tlCtx = tlCanvas.getContext('2d');
  const tlPlayBtn = document.getElementById('tl-play-btn');
  const tlTimeDisplay = document.getElementById('tl-time-display');
  const markerMin = document.getElementById('markerMin');
  const markerSec = document.getElementById('markerSec');
  const addMarkerBtn = document.getElementById('addMarkerBtn');
  const formationInfoEl = document.getElementById('formation-info');

  function getFormations() {
    const fmts = [];
    const boundaries = [0, ...markers.slice().sort((a, b) => a - b)];
    let inPlaceCount = 0;
    for (let i = 0; i < boundaries.length; i++) {
      const num = i + 1;
      const start = boundaries[i];
      const end = (i + 1 < boundaries.length) ? boundaries[i + 1] : null;
      const type = (num % 2 === 1) ? 'inplace' : 'transition';
      if (type === 'inplace') inPlaceCount++;
      fmts.push({ number: num, startTime: start, endTime: end, type, formationLabel: type === 'inplace' ? inPlaceCount : num });
    }
    return fmts;
  }

  function getCurrentFormation(formations, t) {
    for (let i = formations.length - 1; i >= 0; i--) {
      if (t >= formations[i].startTime) return formations[i];
    }
    return formations[0] || null;
  }

  // Expose these globally for animation
  window._getFormations = getFormations;
  window._getCurrentFormation = getCurrentFormation;

  // Add marker
  function addMarker() {
    let t;
    if (markerMin.value === '' && markerSec.value === '') {
      // No input -- stamp exactly at playhead position
      t = Math.round(currentTime * 10) / 10;
      if (t <= 0) return;
    } else {
      const mins = parseInt(markerMin.value, 10) || 0;
      const secs = parseInt(markerSec.value, 10) || 0;
      if (secs >= 60) {
        markerSec.style.borderBottom = '2px solid #e94560';
        setTimeout(() => { markerSec.style.borderBottom = ''; }, 600);
        return;
      }
      t = mins * 60 + secs;
      if (t <= 0) return;
    }
    if (markers.includes(t)) return;
    pushMarkerHistory();
    markers.push(t);
    markers.sort((a, b) => a - b);
    markerMin.value = '';
    markerSec.value = '';
    markerMin.focus();
    renderSnapshots();
    autoSave();
  }

  // Auto-tab from min to sec when 2+ digits typed
  markerMin.addEventListener('input', () => {
    markerMin.value = markerMin.value.replace(/\D/g, '');
    if (markerMin.value.length >= 2) markerSec.focus();
  });
  markerSec.addEventListener('input', () => {
    markerSec.value = markerSec.value.replace(/\D/g, '');
  });

  addMarkerBtn.addEventListener('click', addMarker);
  document.getElementById('undoMarkerBtn').addEventListener('click', undoMarkers);
  markerSec.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addMarker();
  });
  markerMin.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addMarker();
  });

  // Right-click on timeline to delete nearest marker
  tlCanvas.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const idx = findNearbyMarker(e.clientX);
    if (idx >= 0) {
      pushMarkerHistory();
      markers.splice(idx, 1);
      renderSnapshots();
      autoSave();
    }
  });

  // Double-click on timeline to insert a short formation (two markers 0.5s apart)
  tlCanvas.addEventListener('dblclick', (e) => {
    const rect = tlCanvas.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const w = rect.width;
    const t = Math.round(xToTime(clickX, currentTime, w) * 10) / 10;
    const t2 = Math.round((t + 0.5) * 10) / 10;
    if (t <= 0) return;
    let added = false;
    if (!markers.includes(t) || !markers.includes(t2)) pushMarkerHistory();
    if (!markers.includes(t)) { markers.push(t); added = true; }
    if (!markers.includes(t2)) { markers.push(t2); added = true; }
    if (added) {
      markers.sort((a, b) => a - b);
      renderSnapshots();
      autoSave();
    }
  });

  // Play/Pause (synced)
  tlPlayBtn.addEventListener('click', () => {
    setPlaying(!playing);
  });

  // Resize timeline canvas
  function resizeTL() {
    const rect = tlCanvas.getBoundingClientRect();
    tlCanvas.width = rect.width * devicePixelRatio;
    tlCanvas.height = rect.height * devicePixelRatio;
    tlCanvas.style.width = rect.width + 'px';
    tlCanvas.style.height = rect.height + 'px';
    tlCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  window.addEventListener('resize', resizeTL);
  resizeTL();

  function timeToX(t, centerTime, width) {
    const totalWindow = VISIBLE_WINDOW * 2;
    const left = centerTime - VISIBLE_WINDOW;
    return ((t - left) / totalWindow) * width;
  }

  function xToTime(x, centerTime, width) {
    const totalWindow = VISIBLE_WINDOW * 2;
    const left = centerTime - VISIBLE_WINDOW;
    return left + (x / width) * totalWindow;
  }

  function drawTimeline() {
    const w = tlCanvas.width / devicePixelRatio;
    const h = tlCanvas.height / devicePixelRatio;
    const centerTime = currentTime;
    const formations = getFormations();
    const cur = getCurrentFormation(formations, currentTime);

    tlCtx.clearRect(0, 0, w, h);
    tlCtx.fillStyle = '#16213e';
    tlCtx.fillRect(0, 0, w, h);

    const barTop = 10;
    const barHeight = h - 50;
    const barBottom = barTop + barHeight;

    // Draw formations
    for (const f of formations) {
      const start = f.startTime;
      const end = f.endTime !== null ? f.endTime : centerTime + VISIBLE_WINDOW + 100;
      const x1 = timeToX(start, centerTime, w);
      const x2 = timeToX(end, centerTime, w);
      if (x2 < -50 || x1 > w + 50) continue;

      const isCurrent = cur && cur.number === f.number;

      if (f.type === 'inplace') {
        const rx = Math.max(x1, -10);
        const rw = Math.min(x2, w + 10) - rx;
        if (rw <= 0) continue;

        tlCtx.fillStyle = isCurrent ? '#163d6e' : '#0f3460';
        tlCtx.strokeStyle = isCurrent ? '#e94560' : '#1a4a7a';
        tlCtx.lineWidth = isCurrent ? 2 : 1;
        const r = 6;
        tlCtx.beginPath();
        tlCtx.roundRect(rx + 1, barTop, rw - 2, barHeight, r);
        tlCtx.fill();
        tlCtx.stroke();

        const labelX = (x1 + x2) / 2;
        if (labelX > -50 && labelX < w + 50) {
          tlCtx.fillStyle = isCurrent ? '#fff' : '#ccc';
          tlCtx.font = 'bold 12px Courier New, monospace';
          tlCtx.textAlign = 'center';
          tlCtx.textBaseline = 'middle';
          tlCtx.fillText('Formation ' + f.formationLabel, labelX, barTop + barHeight / 2);
        }
      } else {
        // Transition X-crossover
        const segW = x2 - x1;
        if (segW <= 0) continue;

        const topY = barTop + 2;
        const botY = barBottom - 2;
        const midY = (topY + botY) / 2;

        tlCtx.fillStyle = isCurrent ? 'rgba(233,69,96,0.15)' : 'rgba(15,52,96,0.4)';
        tlCtx.beginPath();
        tlCtx.moveTo(x1, topY); tlCtx.lineTo((x1 + x2) / 2, midY); tlCtx.lineTo(x1, botY);
        tlCtx.closePath(); tlCtx.fill();
        tlCtx.beginPath();
        tlCtx.moveTo(x2, topY); tlCtx.lineTo((x1 + x2) / 2, midY); tlCtx.lineTo(x2, botY);
        tlCtx.closePath(); tlCtx.fill();

        tlCtx.strokeStyle = isCurrent ? '#e94560' : '#1a4a7a';
        tlCtx.lineWidth = isCurrent ? 2 : 1.5;
        tlCtx.beginPath(); tlCtx.moveTo(x1, topY); tlCtx.lineTo(x2, botY); tlCtx.stroke();
        tlCtx.beginPath(); tlCtx.moveTo(x1, botY); tlCtx.lineTo(x2, topY); tlCtx.stroke();

        const labelX = (x1 + x2) / 2;
        if (labelX > -50 && labelX < w + 50 && segW > 40) {
          tlCtx.fillStyle = isCurrent ? '#e94560' : '#888';
          tlCtx.font = '10px Courier New, monospace';
          tlCtx.textAlign = 'center';
          tlCtx.textBaseline = 'bottom';
          tlCtx.fillText('T' + f.number, labelX, topY - 1);
        }
      }
    }

    // Time ticks
    const tickInterval = 30;
    const leftTime = centerTime - VISIBLE_WINDOW;
    const rightTime = centerTime + VISIBLE_WINDOW;
    const firstTick = Math.ceil(Math.max(0, leftTime) / tickInterval) * tickInterval;
    tlCtx.font = 'bold 11px Courier New, monospace';
    tlCtx.textAlign = 'center';
    tlCtx.textBaseline = 'top';
    for (let t = firstTick; t <= rightTime; t += tickInterval) {
      const x = timeToX(t, centerTime, w);
      if (x < 0 || x > w) continue;
      const isMajor = (t % 60 === 0);
      tlCtx.strokeStyle = isMajor ? '#334466' : '#263550';
      tlCtx.lineWidth = 1;
      tlCtx.beginPath();
      tlCtx.moveTo(x, barBottom + 2);
      tlCtx.lineTo(x, barBottom + (isMajor ? 8 : 5));
      tlCtx.stroke();
      if (isMajor || w > 600) {
        tlCtx.fillStyle = '#bbb';
        tlCtx.font = 'bold 11px Courier New, monospace';
        tlCtx.fillText(fmt(t), x, barBottom + 10);
      }
    }

    // Marker lines
    for (const mt of markers) {
      const x = timeToX(mt, centerTime, w);
      if (x < 0 || x > w) continue;
      tlCtx.strokeStyle = '#e9456055';
      tlCtx.lineWidth = 1;
      tlCtx.setLineDash([3, 3]);
      tlCtx.beginPath();
      tlCtx.moveTo(x, barTop);
      tlCtx.lineTo(x, barBottom);
      tlCtx.stroke();
      tlCtx.setLineDash([]);
    }

    // Playhead
    const phX = w / 2;
    tlCtx.strokeStyle = '#e94560';
    tlCtx.lineWidth = 2;
    tlCtx.beginPath();
    tlCtx.moveTo(phX, 0);
    tlCtx.lineTo(phX, h);
    tlCtx.stroke();
    tlCtx.fillStyle = '#e94560';
    tlCtx.beginPath();
    tlCtx.moveTo(phX, 0);
    tlCtx.lineTo(phX - 5, 8);
    tlCtx.lineTo(phX + 5, 8);
    tlCtx.closePath();
    tlCtx.fill();
  }

  window._timelineDraw = drawTimeline;

  function updateInfo() {
    const formations = getFormations();
    const cur = getCurrentFormation(formations, currentTime);
    tlTimeDisplay.textContent = fmt(currentTime);
    if (!cur) {
      formationInfoEl.textContent = 'No formations yet.';
    } else if (formations.length === 1) {
      formationInfoEl.textContent = 'Formation 1 (in place) -- add markers for more.';
    } else {
      const typeLabel = cur.type === 'inplace' ? 'in place' : 'transition';
      formationInfoEl.textContent = 'Current: F' + cur.number + ' (' + typeLabel + ') | Total: ' + formations.length;
    }
  }

  // ---- Scrollbar ----
  const scrollbar = document.getElementById('timelineScrollbar');
  let scrollbarSeeking = false;
  let scrollbarResumeAfterSeek = false;

  function getMaxScrollTime() {
    const lastMarker = markers.length > 0 ? markers[markers.length - 1] : 0;
    return Math.max(60, lastMarker + 30);
  }

  function updateScrollbar() {
    const maxTime = getMaxScrollTime();
    scrollbar.max = maxTime;
    const nextValue = String(Math.min(currentTime, maxTime));
    if (scrollbar.value !== nextValue && !scrollbarSeeking) {
      scrollbar.value = nextValue;
    }
  }

  scrollbar.addEventListener('input', () => {
    scrollbarSeeking = true;
    seekUI(parseFloat(scrollbar.value));
  });
  scrollbar.addEventListener('mousedown', () => {
    scrollbarSeeking = true;
    scrollbarResumeAfterSeek = playing;
    if (playing) setPlaying(false);
  });
  scrollbar.addEventListener('touchstart', () => {
    scrollbarSeeking = true;
    scrollbarResumeAfterSeek = playing;
    if (playing) setPlaying(false);
  });
  function endScrollbarSeek() {
    if (!scrollbarSeeking) return;
    scrollbarSeeking = false;
    seekTo(currentTime);
    if (scrollbarResumeAfterSeek) setPlaying(true);
    scrollbarResumeAfterSeek = false;
  }
  window.addEventListener('mouseup', endScrollbarSeek);
  window.addEventListener('touchend', endScrollbarSeek);

  // ---- Mouse wheel panning on timeline canvas ----
  tlCanvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaX !== 0 ? e.deltaX : e.deltaY;
    const panAmount = delta * 0.05;
    seekTo(currentTime + panAmount);
  }, { passive: false });

  // ---- Drag timeline to seek ----
  let draggingTimeline = false;
  let timelineSeekCenter = 0;
  let timelineResumeAfterSeek = false;

  // ---- Drag marker boundaries ----
  let draggingMarkerIndex = -1;
  let markerDragCenter = 0;
  const MARKER_GRAB_PX = 8;

  function findNearbyMarker(clientX) {
    const rect = tlCanvas.getBoundingClientRect();
    const w = rect.width;
    const mouseX = clientX - rect.left;
    let bestIdx = -1;
    let bestDist = Infinity;
    for (let i = 0; i < markers.length; i++) {
      const mx = timeToX(markers[i], currentTime, w);
      const dist = Math.abs(mx - mouseX);
      if (dist < MARKER_GRAB_PX && dist < bestDist) {
        bestDist = dist;
        bestIdx = i;
      }
    }
    return bestIdx;
  }

  function seekToX(clientX, centerTime) {
    const rect = tlCanvas.getBoundingClientRect();
    const clickX = clientX - rect.left;
    const w = rect.width;
    const t = xToTime(clickX, centerTime, w);
    if (t >= 0) {
      seekUI(t);
      const m = Math.floor(currentTime / 60);
      const s = Math.floor(currentTime % 60);
      markerMin.value = String(m);
      markerSec.value = String(s).padStart(2, '0');
    }
  }

  // Cursor style: show col-resize when hovering near a marker boundary
  tlCanvas.addEventListener('mousemove', (e) => {
    if (draggingMarkerIndex >= 0) return;
    if (draggingTimeline) return;
    const idx = findNearbyMarker(e.clientX);
    tlCanvas.style.cursor = idx >= 0 ? 'col-resize' : '';
  });

  tlCanvas.addEventListener('mousedown', (e) => {
    // Check if near a marker boundary first -- marker drag takes priority
    const idx = findNearbyMarker(e.clientX);
    if (idx >= 0) {
      pushMarkerHistory();
      draggingMarkerIndex = idx;
      markerDragCenter = currentTime;
      tlCanvas.style.cursor = 'col-resize';
      e.preventDefault();
      return;
    }
    // Otherwise, normal timeline seek drag
    draggingTimeline = true;
    timelineSeekCenter = currentTime;
    timelineResumeAfterSeek = playing;
    if (playing) setPlaying(false);
    seekToX(e.clientX, timelineSeekCenter);
  });

  window.addEventListener('mousemove', (e) => {
    if (draggingMarkerIndex >= 0) {
      const rect = tlCanvas.getBoundingClientRect();
      const w = rect.width;
      const mouseX = e.clientX - rect.left;
      let newTime = xToTime(mouseX, markerDragCenter, w);

      if (newTime < 0) newTime = 0;

      const sorted = [...markers].sort((a, b) => a - b);
      const sortedIdx = sorted.indexOf(markers[draggingMarkerIndex]);
      if (sortedIdx > 0 && newTime <= sorted[sortedIdx - 1]) {
        newTime = sorted[sortedIdx - 1] + 0.1;
      }
      if (sortedIdx < sorted.length - 1 && newTime >= sorted[sortedIdx + 1]) {
        newTime = sorted[sortedIdx + 1] - 0.1;
      }

      if (newTime < 0.1) newTime = 0.1;

      markers[draggingMarkerIndex] = Math.round(newTime * 10) / 10;
      autoSave();
      return;
    }
    if (draggingTimeline) {
      seekToX(e.clientX, timelineSeekCenter);
    }
  });

  window.addEventListener('mouseup', () => {
    if (draggingMarkerIndex >= 0) {
      if (markers[draggingMarkerIndex] < 1) markers[draggingMarkerIndex] = 1;
      markers.sort((a, b) => a - b);
      draggingMarkerIndex = -1;
      markerDragCenter = 0;
      tlCanvas.style.cursor = '';
      autoSave();
    }
    if (draggingTimeline) {
      seekTo(currentTime);
      if (timelineResumeAfterSeek) setPlaying(true);
    }
    draggingTimeline = false;
    timelineSeekCenter = 0;
    timelineResumeAfterSeek = false;
  });

  // ===== Main animation tick =====
  function tick(now) {
    syncMedia();

    // Formation-driven dot animation
    try { animateDots(); } catch (e) { /* prevent animation errors from killing the loop */ }

    drawTimeline();
    updateInfo();
    updateScrollbar();
    if (window._audioUpdateUI) window._audioUpdateUI();
    updateActiveFormation();

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();

// ========================================================================
//  Formation-Driven Dot Animation
// ========================================================================
// When the playhead is in an "in place" (odd) formation, snap to that
// formation's saved dot arrangement (if one exists in snapshots).
// When in a "transition" (even) formation, linearly interpolate between
// the previous and next "in place" formation's dot arrangements.

let lastFormationNumber = -1;

function getSnapshotForFormation(formationNumber) {
  // Formation numbers in the timeline: 1, 2, 3, ...
  // Odd = in place. We map odd formation number to the snapshot index.
  // Formation 1 -> snapshot[0], Formation 3 -> snapshot[1], Formation 5 -> snapshot[2], etc.
  const inPlaceIndex = Math.floor(formationNumber / 2); // 1->0, 3->1, 5->2
  if (inPlaceIndex >= 0 && inPlaceIndex < snapshots.length) {
    return snapshots[inPlaceIndex];
  }
  return null;
}

function updateCurrentFormationSnapshotFromDots() {
  const formations = window._getFormations ? window._getFormations() : [];
  const cur = window._getCurrentFormation ? window._getCurrentFormation(formations, currentTime) : null;
  if (!cur || cur.type !== 'inplace') return;

  const snap = getSnapshotForFormation(cur.number);
  if (!snap) return;
  snap.dots = dots.map(d => ({ ...d }));
  snap.timestamp = new Date().toLocaleString();
  renderSnapshots();
}

function animateDots() {
  const formations = window._getFormations ? window._getFormations() : [];
  if (formations.length <= 1) return; // No markers, no animation

  const cur = window._getCurrentFormation ? window._getCurrentFormation(formations, currentTime) : null;
  if (!cur) return;

  if (cur.type === 'inplace') {
    // Snap to this formation's saved arrangement
    const snap = getSnapshotForFormation(cur.number);
    if (snap && snap.dots && snap.dots.length === 9) {
      let changed = false;
      for (let i = 0; i < 9; i++) {
        const target = snap.dots.find(d => d.id === dots[i].id);
        if (target && (dots[i].gx !== target.gx || dots[i].gy !== target.gy)) {
          dots[i].gx = target.gx;
          dots[i].gy = target.gy;
          changed = true;
        }
      }
      if (changed) drawGrid();
    }
  } else {
    // Transition: interpolate between previous and next in-place formations
    const prevFormationNum = cur.number - 1; // odd, the one before
    const nextFormationNum = cur.number + 1; // odd, the one after

    const prevSnap = getSnapshotForFormation(prevFormationNum);
    const nextSnap = getSnapshotForFormation(nextFormationNum);

    if (prevSnap && prevSnap.dots && nextSnap && nextSnap.dots &&
        prevSnap.dots.length === 9 && nextSnap.dots.length === 9) {
      // Calculate interpolation t
      const duration = cur.endTime !== null ? (cur.endTime - cur.startTime) : 1;
      const elapsed = currentTime - cur.startTime;
      const t = Math.max(0, Math.min(1, elapsed / duration));

      for (let i = 0; i < 9; i++) {
        const from = prevSnap.dots.find(d => d.id === dots[i].id);
        const to = nextSnap.dots.find(d => d.id === dots[i].id);
        if (from && to) {
          dots[i].gx = lerp(from.gx, to.gx, t);
          dots[i].gy = lerp(from.gy, to.gy, t);
        }
      }
      drawGrid();
    } else if (prevSnap && prevSnap.dots && prevSnap.dots.length === 9) {
      // Only have the previous formation, snap to it
      for (let i = 0; i < 9; i++) {
        const target = prevSnap.dots.find(d => d.id === dots[i].id);
        if (target) {
          dots[i].gx = target.gx;
          dots[i].gy = target.gy;
        }
      }
      drawGrid();
    }
  }
}

// ========================================================================
//  Initialization
// ========================================================================
initTriangle();
autoRestore();

// Column toggle buttons (Idol / Member)
document.getElementById('btn-all-idol').addEventListener('click', () => {
  dots.forEach(d => { d.name = d.idol; });
  drawGrid();
  renderDotsList();
  autoSave();
  document.getElementById('btn-all-idol').classList.add('active');
  document.getElementById('btn-all-member').classList.remove('active');
});
document.getElementById('btn-all-member').addEventListener('click', () => {
  dots.forEach(d => { d.name = d.member; });
  drawGrid();
  renderDotsList();
  autoSave();
  document.getElementById('btn-all-member').classList.add('active');
  document.getElementById('btn-all-idol').classList.remove('active');
});


window.addEventListener('resize', resizeGrid);
resizeGrid();
renderDotsList();
renderSnapshots();
startCloudSync();
</script>

<!-- Video event handlers -->
<script>
(function() {
  getAllVideos().forEach(vid => {
    vid.addEventListener('loadedmetadata', () => {
      syncVideoToClock(true, vid);
    });
    vid.addEventListener('ended', () => {
      const allDone = getActiveVideos().every(v => v.ended || v.currentTime >= v.duration);
      if (allDone) setPlaying(false);
    });
  });
})();
</script>

<!-- Video source toggle -->
<script>
(function() {
  const btns = document.querySelectorAll('.vid-src-btn');
  const opacity = document.getElementById('video-opacity');
  const zb1 = document.getElementById('ref-video');
  const dkdc = document.getElementById('dkdc-video');

  function setButtonActive(mode) {
    btns.forEach(b => {
      const active = b.dataset.mode === mode;
      b.style.background = active ? '#e94560' : 'none';
      b.style.color = active ? '#eee' : '#e94560';
      b.classList.toggle('active', active);
    });
  }

  function updateMuting() {
    if (videoMode === 'zb1') {
      zb1.muted = false;
      dkdc.muted = true;
    } else if (videoMode === 'dkdc') {
      zb1.muted = true;
      dkdc.muted = false;
    } else {
      // Overlay: audio from whichever video is more visible
      const dkdcOpacity = parseFloat(opacity.value);
      zb1.muted = dkdcOpacity > 0.3;
      dkdc.muted = dkdcOpacity <= 0.3;
    }
  }

  function applyVideoMode(mode) {
    videoMode = mode;
    setButtonActive(mode);
    opacity.style.display = mode === 'overlay' ? 'block' : 'none';

    zb1.style.display = mode === 'dkdc' ? 'none' : 'block';
    dkdc.style.display = mode === 'zb1' ? 'none' : 'block';
    zb1.style.opacity = '1';
    dkdc.style.opacity = mode === 'overlay' ? opacity.value : '1';

    updateMuting();

    getAllVideos().forEach(vid => {
      vid.playbackRate = 1;
      syncVideoToClock(true, vid);
      if (!getActiveVideos().includes(vid) && !vid.paused) vid.pause();
    });

    updateOffsetDisplay();

    seekTo(currentTime);
    if (playing) {
      getActiveVideos().forEach(vid => {
        if (isFinite(vid.duration) && vid.paused) vid.play().catch(() => {});
      });
    }
  }

  btns.forEach(btn => {
    btn.addEventListener('click', () => {
      applyVideoMode(btn.dataset.mode);
    });
  });

  opacity.addEventListener('input', () => {
    if (videoMode === 'overlay') {
      dkdc.style.opacity = opacity.value;
      updateMuting();
    }
  });

  applyVideoMode(videoMode);

  // Offset fine-tune controls
  function adjustOffset(delta) {
    const vid = getPrimaryVideo();
    if (!vid) return;
    const key = getVideoSourceName(vid);
    if (!key || !VIDEO_SYNC[key]) return;
    VIDEO_SYNC[key].offset = Math.round((VIDEO_SYNC[key].offset + delta) * 100) / 100;
    updateOffsetDisplay();
    seekTo(currentTime);
  }

  document.getElementById('offset-minus').addEventListener('click', () => adjustOffset(-0.01));
  document.getElementById('offset-plus').addEventListener('click', () => adjustOffset(0.01));
  updateOffsetDisplay();
})();
</script>
