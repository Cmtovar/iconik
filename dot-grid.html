<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dot Grid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: monospace; background: #1a1a2e; color: #eee; display: flex; height: 100vh; }

  #sidebar {
    width: 260px; background: #16213e; padding: 16px; overflow-y: auto;
    border-right: 2px solid #0f3460; display: flex; flex-direction: column; gap: 12px;
  }
  #sidebar h2 { font-size: 14px; color: #e94560; text-transform: uppercase; letter-spacing: 1px; }
  #sidebar button {
    background: #0f3460; color: #eee; border: 1px solid #e94560; padding: 8px 12px;
    cursor: pointer; font-family: monospace; font-size: 13px; border-radius: 4px;
  }
  #sidebar button:hover { background: #e94560; }

  .snapshot {
    background: #0f3460; border: 1px solid #333; border-radius: 4px; padding: 8px;
    cursor: pointer; font-size: 12px; position: relative;
  }
  .snapshot:hover { border-color: #e94560; }
  .snapshot .snap-title { font-weight: bold; margin-bottom: 4px; }
  .snapshot .snap-info { color: #999; font-size: 11px; }
  .snapshot .snap-delete {
    position: absolute; top: 4px; right: 6px; color: #e94560; cursor: pointer;
    font-size: 14px; background: none; border: none; padding: 2px 4px;
  }

  .dot-item {
    display: flex; align-items: center; gap: 6px; padding: 4px 6px;
    background: #0f3460; border-radius: 4px; font-size: 11px;
  }
  .dot-swatch {
    width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; flex-shrink: 0;
  }
  .dot-name-btn {
    background: none; border: 1px solid #333; color: #999; padding: 2px 6px;
    font-family: monospace; font-size: 11px; border-radius: 3px; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .dot-name-btn:hover { border-color: #e94560; color: #eee; }
  .dot-name-btn.active { border-color: #e94560; color: #eee; background: #e94560; }

  #dots-list { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }

  #grid-container { flex: 1; position: relative; overflow: hidden; cursor: default; }
  canvas { display: block; width: 100%; height: 100%; }

  #dot-info {
    position: absolute; top: 12px; right: 12px; background: #16213e; border: 1px solid #0f3460;
    padding: 8px 12px; border-radius: 4px; font-size: 12px; color: #999;
  }

  #snapshots-list { display: flex; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>Dot Grid</h2>
  <div id="dot-info-sidebar" style="font-size:12px;color:#999;">Drag dots to reposition them on the grid.</div>
  <h2 style="margin-top:8px;">Dots</h2>
  <div id="dots-list"></div>
  <button id="btn-save">Save Freeze Frame</button>
  <h2 style="margin-top:8px;">Freeze Frames</h2>
  <div id="snapshots-list"></div>
</div>

<div id="grid-container">
  <canvas id="canvas"></canvas>
  <div id="dot-info">Dots: <span id="dot-count">9</span></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const GRID_SIZE = 45;
const DOT_RADIUS = 14;

// Stage definition: landscape rectangle
const STAGE_COLS_HALF = 8;  // -8 to 8 horizontally (17 positions)
const STAGE_ROWS_HALF = 5;  // -5 to 5 vertically (11 positions)
const STAGE_MARGIN_X = 50;  // margin from canvas edge to red border
const STAGE_MARGIN_Y = 35;

const COLORS = [
  '#e94560','#3498db','#2ecc71','#f39c12','#9b59b6',
  '#1abc9c','#e67e22','#e74c3c','#00bcd4','#ff6b8a',
  '#8bc34a','#ff9800','#607d8b','#cddc39','#795548',
  '#4dd0e1','#ba68c8','#aed581','#ffb74d','#90a4ae'
];

const MEMBERS = [
  { idol: 'HANBIN',   member: 'Jordan' },
  { idol: 'JIWOONG',  member: 'Caroline' },
  { idol: 'MATTHEW',  member: 'Bela' },
  { idol: 'TAERAE',   member: 'Gauri' },
  { idol: 'GUNWOOK',  member: 'Dani' },
  { idol: 'ZHANGHAO', member: 'Natalie' },
  { idol: 'RICKY',    member: 'Imene' },
  { idol: 'GYUVIN',   member: 'Cristian' },
  { idol: 'YUJIN',    member: 'Lauren' },
];
let dots = []; // { id, gx, gy, color, name, idol, member }
let snapshots = []; // { name, timestamp, dots: [...] }
let hoveredDot = null;
let draggingDot = null;
let dragOffsetX = 0;
let dragOffsetY = 0;
let dragPixelX = 0;
let dragPixelY = 0;
let formationCounter = 0;

function initTriangle() {
  // Triangle formation pointing upward, 9 dots:
  // Center-origin coordinates: positive X = right, positive Y = up (stage coords)
  const sp = 2; // spacing in grid units

  const positions = [
    // Row 1 (top): 1 dot
    { gx: 0, gy: 3 * sp },
    // Row 2: 2 dots
    { gx: -sp, gy: 2 * sp },
    { gx: sp, gy: 2 * sp },
    // Row 3: 3 dots
    { gx: -2 * sp, gy: sp },
    { gx: 0, gy: sp },
    { gx: 2 * sp, gy: sp },
    // Row 4 (bottom): 3 dots
    { gx: -2 * sp, gy: 0 },
    { gx: 0, gy: 0 },
    { gx: 2 * sp, gy: 0 },
  ];

  dots = positions.map((pos, i) => ({
    id: i + 1,
    gx: pos.gx,
    gy: pos.gy,
    color: COLORS[i % COLORS.length],
    name: MEMBERS[i].idol,
    idol: MEMBERS[i].idol,
    member: MEMBERS[i].member,
  }));
}

function resize() {
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = canvas.parentElement.clientHeight;
  draw();
}
window.addEventListener('resize', resize);

// Stage bounding box in canvas pixels
function getStageRect() {
  const w = canvas.width, h = canvas.height;
  const stageW = w - 2 * STAGE_MARGIN_X;
  const stageH = h - 2 * STAGE_MARGIN_Y;
  // Fit to landscape aspect ratio based on grid units
  const unitW = stageW / (STAGE_COLS_HALF * 2);
  const unitH = stageH / (STAGE_ROWS_HALF * 2);
  const unit = Math.min(unitW, unitH);
  const actualW = unit * STAGE_COLS_HALF * 2;
  const actualH = unit * STAGE_ROWS_HALF * 2;
  const left = (w - actualW) / 2;
  const top = (h - actualH) / 2;
  return { left, top, width: actualW, height: actualH, unit, centerX: w / 2, centerY: h / 2 };
}

// Convert stage grid coords to canvas pixel coords
// Stage: +X right, +Y up. Canvas: +X right, +Y down.
function gridToPixel(gx, gy) {
  const s = getStageRect();
  return { px: s.centerX + gx * s.unit, py: s.centerY - gy * s.unit };
}

// Convert canvas pixel coords to stage grid coords
function pixelToGrid(px, py) {
  const s = getStageRect();
  return {
    gx: Math.round((px - s.centerX) / s.unit * 2) / 2,
    gy: Math.round((s.centerY - py) / s.unit * 2) / 2
  };
}

function drawRoundedRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function draw() {
  const w = canvas.width, h = canvas.height;
  const s = getStageRect();
  const { left, top, width: stageW, height: stageH, unit, centerX, centerY } = s;
  ctx.clearRect(0, 0, w, h);

  // Background fill
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, w, h);

  // Clip drawing to stage area for grid elements
  ctx.save();
  ctx.beginPath();
  ctx.rect(left, top, stageW, stageH);
  ctx.clip();

  // Subtle alternating column banding
  ctx.fillStyle = 'rgba(30, 36, 68, 0.15)';
  for (let c = -STAGE_COLS_HALF; c < STAGE_COLS_HALF; c++) {
    if ((c + STAGE_COLS_HALF) % 2 === 1) {
      const x = centerX + c * unit;
      ctx.fillRect(x, top, unit, stageH);
    }
  }

  // Grid lines within the stage
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 0.5;
  // Vertical lines
  for (let c = -STAGE_COLS_HALF; c <= STAGE_COLS_HALF; c++) {
    const x = centerX + c * unit;
    ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, top + stageH); ctx.stroke();
  }
  // Horizontal lines
  for (let r = -STAGE_ROWS_HALF; r <= STAGE_ROWS_HALF; r++) {
    const y = centerY + r * unit;
    ctx.beginPath(); ctx.moveTo(left, y); ctx.lineTo(left + stageW, y); ctx.stroke();
  }

  // Red crosshair through center, only within stage
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(centerX, top); ctx.lineTo(centerX, top + stageH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(left, centerY); ctx.lineTo(left + stageW, centerY); ctx.stroke();

  ctx.restore(); // remove clip

  // Red/coral rounded border rectangle defining the stage
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 2.5;
  drawRoundedRect(ctx, left, top, stageW, stageH, 12);
  ctx.stroke();

  // Axis labels along the bottom, just below the red border
  ctx.fillStyle = '#999';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const labelY = top + stageH + 8;
  for (let n = -STAGE_COLS_HALF; n <= STAGE_COLS_HALF; n++) {
    const lx = centerX + n * unit;
    ctx.fillText(Math.abs(n).toString(), lx, labelY);
  }

  // Dots
  for (const dot of dots) {
    let x, y;
    if (dot === draggingDot) {
      x = dragPixelX;
      y = dragPixelY;
    } else {
      const p = gridToPixel(dot.gx, dot.gy);
      x = p.px;
      y = p.py;
    }
    ctx.beginPath();
    ctx.arc(x, y, DOT_RADIUS, 0, Math.PI * 2);
    const baseColor = dot.color || '#e94560';
    ctx.fillStyle = (dot === hoveredDot || dot === draggingDot) ? '#fff' : baseColor;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // id label
    ctx.fillStyle = (dot === hoveredDot || dot === draggingDot) ? '#333' : '#fff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(dot.id, x, y);

    // name label above
    if (dot.name) {
      ctx.fillStyle = '#eee';
      ctx.font = 'bold 11px monospace';
      ctx.fillText(dot.name, x, y - DOT_RADIUS - 6);
    }
  }

  document.getElementById('dot-count').textContent = dots.length;
}

function snapToGrid(px, py) {
  return pixelToGrid(px, py);
}

function findDotAt(gx, gy) {
  return dots.find(d => d.gx === gx && d.gy === gy) || null;
}

function findDotNearPixel(px, py) {
  for (const dot of dots) {
    const p = gridToPixel(dot.gx, dot.gy);
    const dx = p.px - px;
    const dy = p.py - py;
    if (Math.sqrt(dx * dx + dy * dy) <= DOT_RADIUS + 4) {
      return dot;
    }
  }
  return null;
}

// Drag handling
canvas.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  const rect = canvas.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;
  const dot = findDotNearPixel(px, py);
  if (dot) {
    draggingDot = dot;
    const dp = gridToPixel(dot.gx, dot.gy);
    dragPixelX = dp.px;
    dragPixelY = dp.py;
    canvas.style.cursor = 'grabbing';
    draw();
  }
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;

  if (draggingDot) {
    dragPixelX = px;
    dragPixelY = py;
    draw();
  } else {
    const prev = hoveredDot;
    hoveredDot = findDotNearPixel(px, py);
    if (hoveredDot !== prev) {
      canvas.style.cursor = hoveredDot ? 'grab' : 'default';
      draw();
    }
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (!draggingDot) return;
  const rect = canvas.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;
  const { gx, gy } = snapToGrid(px, py);

  // Check if target is occupied by another dot
  const occupant = findDotAt(gx, gy);
  if (!occupant || occupant === draggingDot) {
    draggingDot.gx = gx;
    draggingDot.gy = gy;
  }
  // If occupied by another dot, snap back to original position (no change)

  draggingDot = null;
  canvas.style.cursor = 'default';
  draw();
  renderDotsList();
});

canvas.addEventListener('mouseleave', () => {
  if (draggingDot) {
    // Cancel drag, snap back
    draggingDot = null;
    canvas.style.cursor = 'default';
    draw();
  }
  hoveredDot = null;
});

// Prevent context menu on canvas
canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
});

// Freeze frames
document.getElementById('btn-save').addEventListener('click', () => {
  formationCounter++;
  const snap = {
    name: `Formation ${formationCounter}`,
    timestamp: new Date().toLocaleString(),
    dots: dots.map(d => ({ ...d }))
  };
  snapshots.push(snap);
  renderSnapshots();
});

function renderDotsList() {
  const list = document.getElementById('dots-list');
  list.innerHTML = '';
  for (const dot of dots) {
    const el = document.createElement('div');
    el.className = 'dot-item';
    const swatch = document.createElement('div');
    swatch.className = 'dot-swatch';
    swatch.style.background = dot.color || '#e94560';

    const idolBtn = document.createElement('button');
    idolBtn.className = 'dot-name-btn' + (dot.name === dot.idol ? ' active' : '');
    idolBtn.textContent = dot.idol;
    idolBtn.addEventListener('click', () => {
      dot.name = dot.idol;
      draw();
      renderDotsList();
    });

    const memberBtn = document.createElement('button');
    memberBtn.className = 'dot-name-btn' + (dot.name === dot.member ? ' active' : '');
    memberBtn.textContent = dot.member;
    memberBtn.addEventListener('click', () => {
      dot.name = dot.member;
      draw();
      renderDotsList();
    });

    el.appendChild(swatch);
    el.appendChild(idolBtn);
    el.appendChild(memberBtn);
    list.appendChild(el);
  }
}

function renderSnapshots() {
  const list = document.getElementById('snapshots-list');
  list.innerHTML = '';
  snapshots.forEach((snap, i) => {
    const el = document.createElement('div');
    el.className = 'snapshot';
    el.innerHTML = `
      <div class="snap-title">${snap.name} (${snap.dots.length} dots)</div>
      <div class="snap-info">${snap.timestamp}</div>
      <button class="snap-delete" data-i="${i}">&times;</button>
    `;
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('snap-delete')) return;
      dots = snap.dots.map(d => ({ ...d }));
      draw();
      renderDotsList();
    });
    el.querySelector('.snap-delete').addEventListener('click', () => {
      snapshots.splice(i, 1);
      renderSnapshots();
    });
    list.appendChild(el);
  });
}

// Initialize
initTriangle();
resize();
renderDotsList();
</script>
</body>
</html>
