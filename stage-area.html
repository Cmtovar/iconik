<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage Area</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1f; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  draw();
}
window.addEventListener('resize', resize);

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#1a1a1f';
  ctx.fillRect(0, 0, W, H);

  // Stage dimensions
  const marginX = 160, marginY = 50;
  const stageW = W - marginX * 2;
  const stageH = H - marginY * 2 - 30; // reserve 30px for axis labels

  // 16 wide x 10 tall, square cells
  const maxUnitW = stageW / 16;
  const maxUnitH = stageH / 10;
  const unit = Math.min(maxUnitW, maxUnitH);
  const sw = unit * 16;
  const sh = unit * 10;

  const left = (W - sw) / 2;
  const top = (H - sh - 20) / 2;
  const cx = left + sw / 2;
  const cy = top + sh / 2;
  const unitX = unit;

  // Rounded clip path for stage fill
  const r = 14;
  const bLeft = left - unit, bTop = top, bW = sw + unit * 2, bH = sh;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(bLeft + r, bTop);
  ctx.lineTo(bLeft + bW - r, bTop);
  ctx.quadraticCurveTo(bLeft + bW, bTop, bLeft + bW, bTop + r);
  ctx.lineTo(bLeft + bW, bTop + bH - r);
  ctx.quadraticCurveTo(bLeft + bW, bTop + bH, bLeft + bW - r, bTop + bH);
  ctx.lineTo(bLeft + r, bTop + bH);
  ctx.quadraticCurveTo(bLeft, bTop + bH, bLeft, bTop + bH - r);
  ctx.lineTo(bLeft, bTop + r);
  ctx.quadraticCurveTo(bLeft, bTop, bLeft + r, bTop);
  ctx.closePath();
  ctx.clip();

  // Dark fill
  ctx.fillStyle = '#2d2d44';
  ctx.fillRect(bLeft, bTop, bW, bH);

  // Outer columns (2 on each side) slightly lighter
  ctx.fillStyle = '#3f3f55';
  ctx.fillRect(bLeft, bTop, unit * 2, bH);           // left 2 columns
  ctx.fillRect(left + sw - unit, bTop, unit * 2, bH);      // right 2 columns

  // Fine grid lines (every 1 unit)
  ctx.strokeStyle = '#4a4a70';
  ctx.lineWidth = 1;

  // Vertical grid lines (9 columns each side, extra 1 beyond border)
  for (let i = -9; i <= 9; i++) {
    const x = cx + i * unit;
    ctx.beginPath();
    ctx.moveTo(x, top);
    ctx.lineTo(x, top + sh);

    ctx.stroke();
  }

  // Horizontal grid lines (5 above, 5 below center = 10 rows)
  for (let i = -5; i <= 5; i++) {
    const y = cy + i * unit;
    ctx.beginPath();
    ctx.moveTo(left - unit, y);
    ctx.lineTo(left + sw + unit, y);
    ctx.stroke();
  }


  ctx.restore(); // remove clip

  // Red cross at center point
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 1.5;
  const crossLen = 10;
  ctx.beginPath(); ctx.moveTo(cx - crossLen, cy); ctx.lineTo(cx + crossLen, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy - crossLen); ctx.lineTo(cx, cy + crossLen); ctx.stroke();

  // Red border (rounded, coral-ish)
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(bLeft + r, bTop);
  ctx.lineTo(bLeft + bW - r, bTop);
  ctx.quadraticCurveTo(bLeft + bW, bTop, bLeft + bW, bTop + r);
  ctx.lineTo(bLeft + bW, bTop + bH - r);
  ctx.quadraticCurveTo(bLeft + bW, bTop + bH, bLeft + bW - r, bTop + bH);
  ctx.lineTo(bLeft + r, bTop + bH);
  ctx.quadraticCurveTo(bLeft, bTop + bH, bLeft, bTop + bH - r);
  ctx.lineTo(bLeft, bTop + r);
  ctx.quadraticCurveTo(bLeft, bTop, bLeft + r, bTop);
  ctx.closePath();
  ctx.stroke();

  // Red dash marks at midpoint of each edge
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 2;
  const dashLen = 10;
  // Top edge midpoint — snapped to grid line (cx is on grid)
  ctx.beginPath(); ctx.moveTo(cx, bTop - dashLen); ctx.lineTo(cx, bTop + dashLen); ctx.stroke();
  // Bottom edge midpoint
  ctx.beginPath(); ctx.moveTo(cx, bTop + bH - dashLen); ctx.lineTo(cx, bTop + bH + dashLen); ctx.stroke();
  // Left edge midpoint — snapped to grid line (cy is on grid)
  ctx.beginPath(); ctx.moveTo(bLeft - dashLen, cy); ctx.lineTo(bLeft + dashLen, cy); ctx.stroke();
  // Right edge midpoint
  ctx.beginPath(); ctx.moveTo(bLeft + bW - dashLen, cy); ctx.lineTo(bLeft + bW + dashLen, cy); ctx.stroke();

  // Axis labels at bottom
  ctx.fillStyle = '#777';
  ctx.font = '26px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const labelY = top + sh + 20;
  for (let i = -8; i <= 8; i++) {
    ctx.fillText(Math.abs(i).toString(), cx + i * unitX, labelY);
  }
}

resize();
</script>
</body>
</html>
